<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldMind | Operations</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080C10;
            --surface: #0F1419;
            --elevated: #151C24;
            --border: #1E2A35;
            --borderGold: #B8965A44;
            --gold: #C9A84C;
            --goldLight: #E2C97E;
            --goldDim: #7A5C2A;
            --navy: #0D2340;
            --navyMid: #0F2D52;
            --navyLight: #1A4068;
            --white: #F5F0E8;
            --muted: #6B7D8E;
            --dimText: #3D4F5E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow-x: hidden; 
        }
        ::-webkit-scrollbar { display: none; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes splashFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        
        .kanban-board {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .kanban-col {
            min-width: 280px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: calc(100dvh - 220px);
        }
        .job-card {
            cursor: grab;
            transition: opacity 0.2s;
        }
        .job-card:active { cursor: grabbing; }
        .job-card.dragging { opacity: 0.4; border: 1px dashed var(--gold); }

        .btn-action {
            background: var(--elevated);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        textarea, .fm-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
            resize: vertical;
        }
        textarea:focus, .fm-input:focus { border-color: var(--gold); }
        .fm-input { height: 40px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // SUPABASE CONFIGURATION
        const SUPABASE_URL = 'https://okugnkdpszqjawmvpgim.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XUdb6q6-o8ntq49ihmkOEw_GFfffsWR';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 20, color = 'var(--muted)', strokeWidth = 1.5 }) => {
            const s = { width: size, height: size, flexShrink: 0 };
            const p = { stroke: color, strokeWidth, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" };
            const paths = {
                grid: <><rect x="3" y="3" width="7" height="7" rx="1" {...p}/><rect x="14" y="3" width="7" height="7" rx="1" {...p}/><rect x="3" y="14" width="7" height="7" rx="1" {...p}/><rect x="14" y="14" width="7" height="7" rx="1" {...p}/></>,
                briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" {...p}/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" {...p}/></>,
                sparkles: <><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z" {...p}/><path d="M19 3l.75 2.25L22 6l-2.25.75L19 9l-.75-2.25L16 6l2.25-.75z" {...p}/></>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" {...p}/><line x1="3" y1="10" x2="21" y2="10" {...p}/><line x1="8" y1="2" x2="8" y2="6" {...p}/><line x1="16" y1="2" x2="16" y2="6" {...p}/></>,
                menu: <><line x1="3" y1="6" x2="21" y2="6" {...p}/><line x1="3" y1="12" x2="21" y2="12" {...p}/><line x1="3" y1="18" x2="21" y2="18" {...p}/></>,
                bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" {...p}/><path d="M13.73 21a2 2 0 0 1-3.46 0" {...p}/></>,
                chevron: <><polyline points="9 18 15 12 9 6" {...p}/></>,
                chevronLeft: <><polyline points="15 18 9 12 15 6" {...p}/></>,
                settings: <><circle cx="12" cy="12" r="3" {...p}/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" {...p}/></>,
                dollar: <><line x1="12" y1="1" x2="12" y2="23" {...p}/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" {...p}/></>,
                file: <><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" {...p}/><polyline points="14 2 14 8 20 8" {...p}/></>,
                phone: <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" {...p}/></>,
                mail: <><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" {...p}/><polyline points="22,6 12,13 2,6" {...p}/></>,
                map: <><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" {...p}/><line x1="8" y1="2" x2="8" y2="18" {...p}/><line x1="16" y1="6" x2="16" y2="22" {...p}/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19" {...p}/><line x1="5" y1="12" x2="19" y2="12" {...p}/></>,
                logout: <><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" {...p}/><polyline points="16 17 21 12 16 7" {...p}/><line x1="21" y1="12" x2="9" y2="12" {...p}/></>,
                network: <><circle cx="12" cy="5" r="3" {...p}/><circle cx="5" cy="19" r="3" {...p}/><circle cx="19" cy="19" r="3" {...p}/><line x1="12" y1="8" x2="5" y2="16" {...p}/><line x1="12" y1="8" x2="19" y2="16" {...p}/></>,
                clock: <><circle cx="12" cy="12" r="10" {...p}/><polyline points="12 6 12 12 16 14" {...p}/></>,
                edit: <><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" {...p}/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" {...p}/></>,
                cloud: <><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" {...p}/></>,
            };
            return (
                <svg viewBox="0 0 24 24" style={s}>
                    {paths[name] || null}
                </svg>
            );
        };

        const COLUMNS = [
            { id: "new_lead", label: "New Lead" },
            { id: "est_needed", label: "Estimate Needed" },
            { id: "est_delivered", label: "Estimate Delivered" },
            { id: "needs_scheduling", label: "Needs Scheduling" },
            { id: "wip", label: "Work in Progress" },
            { id: "invoice_sent", label: "Final Invoice Sent" },
            { id: "paid_closed", label: "Paid & Closed" },
            { id: "lost_lead", label: "Lost Lead" }
        ];

        function Dashboard({ setView, projects }) {
            const activeCount = projects.filter(p => ["wip", "needs_scheduling"].includes(p.status)).length;
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
                    <div style={{
                        background: `linear-gradient(145deg, #0A1828 0%, var(--navy) 60%, #0A2240 100%)`,
                        borderRadius: 16, padding: "28px 24px", border: '1px solid var(--navyLight)',
                        position: "relative", overflow: "hidden",
                    }}>
                        <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.05em", color: 'var(--goldDim)', textTransform: "uppercase", margin: 0 }}>Projected Gross Volume</p>
                        <h2 style={{ fontSize: 36, fontWeight: 700, color: 'var(--goldLight)', margin: "8px 0 0" }}>$184,200</h2>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div onClick={() => setView("jobs")} style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: "16px", cursor: "pointer", animation: 'fadeUp 0.4s ease both' }}>
                            <p style={{ fontSize: 10, color: 'var(--dimText)', textTransform: "uppercase", fontWeight: 700, margin: 0 }}>Active Jobs</p>
                            <p style={{ fontSize: 24, fontWeight: 700, color: 'var(--white)', margin: "4px 0 0" }}>{activeCount}</p>
                            <p style={{ fontSize: 10, color: 'var(--gold)', margin: "4px 0 0", fontWeight: 600 }}>Click to view board</p>
                        </div>
                        {[{ label: "Avg Margin", value: "32%", sub: "↑ 2% this qtr" }, { label: "Open Quotes", value: "14", sub: "$92k value" }, { label: "Sub Crews", value: "5", sub: "all assigned" }].map((s, i) => (
                            <div key={i} style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: "16px", animation: `fadeUp 0.4s ease both`, animationDelay: `${(i+1) * 60}ms` }}>
                                <p style={{ fontSize: 10, color: 'var(--dimText)', textTransform: "uppercase", fontWeight: 700, margin: 0 }}>{s.label}</p>
                                <p style={{ fontSize: 24, fontWeight: 700, color: 'var(--white)', margin: "4px 0 0" }}>{s.value}</p>
                                <p style={{ fontSize: 10, color: 'var(--gold)', margin: "4px 0 0", fontWeight: 600 }}>{s.sub}</p>
                            </div>
                        ))}
                    </div>
                    <div>
                        <p style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.05em", color: 'var(--goldDim)', textTransform: "uppercase", marginBottom: 12 }}>FieldMind Intel</p>
                        <div style={{ background: 'var(--elevated)', border: '1px solid var(--borderGold)', borderRadius: 12, padding: "16px", display: "flex", gap: 14 }}>
                            <div style={{ width: 36, height: 36, borderRadius: 8, flexShrink: 0, background: `linear-gradient(135deg, var(--goldDim), var(--gold)60)`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                                <Icon name="sparkles" size={20} color="var(--bg)" />
                            </div>
                            <div style={{ flex: 1 }}>
                                <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--white)', margin: 0 }}>Permit Alert: Peachtree St</p>
                                <p style={{ fontSize: 12, color: 'var(--muted)', margin: "4px 0 12px", lineHeight: 1.5 }}>Structural permits for foundation work expire in 72 hours. Shall I initiate a renewal request?</p>
                                <button style={{ background: "transparent", border: '1px solid var(--gold)60', color: 'var(--gold)', fontSize: 10, fontWeight: 700, textTransform: "uppercase", padding: "8px 14px", borderRadius: 6 }}>Renew Permit</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function JobsBoard({ projects, setProjects, onSelectProject }) {
            const [draggingId, setDraggingId] = useState(null);
            const onDragStart = (id) => setDraggingId(id);
            const onDragOver = (e) => e.preventDefault();
            
            const onDrop = async (status) => {
                if (!draggingId) return;
                // UPDATE LOCAL STATE FIRST FOR SPEED
                setProjects(prev => prev.map(p => p.id === draggingId ? { ...p, status } : p));
                
                // SYNC WITH SUPABASE
                await supabase.from('projects').update({ status }).eq('id', draggingId);
                setDraggingId(null);
            };

            return (
                <div className="kanban-board">
                    {COLUMNS.map(col => (
                        <div key={col.id} className="kanban-col" onDragOver={onDragOver} onDrop={() => onDrop(col.id)}>
                            <div style={{ padding: "16px", borderBottom: '1px solid var(--border)' }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }}>{col.label}</span>
                                    <span style={{ fontSize: 10, color: 'var(--dimText)', fontWeight: 600 }}>{projects.filter(p => p.status === col.id).length}</span>
                                </div>
                            </div>
                            <div style={{ flex: 1, padding: "12px", display: "flex", flexDirection: "column", gap: 12, overflowY: "auto" }}>
                                {projects.filter(p => p.status === col.id).map(p => (
                                    <div key={p.id} draggable onDragStart={() => onDragStart(p.id)} onClick={() => onSelectProject(p)} className={`job-card ${draggingId === p.id ? 'dragging' : ''}`} style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: "14px", animation: 'fadeUp 0.3s ease both' }}>
                                        <p style={{ fontSize: 14, fontWeight: 600, color: 'var(--white)', margin: 0 }}>{p.name}</p>
                                        <p style={{ fontSize: 11, color: 'var(--muted)', margin: "4px 0 8px" }}>{p.addr}</p>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                            <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--goldLight)', background: 'var(--navy)', padding: "2px 8px", borderRadius: 4 }}>{p.value}</span>
                                            <Icon name="chevron" size={12} color="var(--dimText)" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function JobDetail({ project, onBack, onAddNote, onUpdateContact }) {
            const currentStage = COLUMNS.find(c => c.id === project.status)?.label;
            const [isAddingNote, setIsAddingNote] = useState(false);
            const [newNoteContent, setNewNoteContent] = useState("");
            
            const [isEditingContact, setIsEditingContact] = useState(false);
            const [editData, setEditData] = useState({ client: project.client, phone: project.phone || "(555) 123-4567", email: project.email || "client@mail.com" });

            const handleSaveNote = () => {
                if (newNoteContent.trim()) {
                    onAddNote(project.id, newNoteContent);
                    setNewNoteContent("");
                    setIsAddingNote(false);
                }
            };

            const handleSaveContact = () => {
                onUpdateContact(project.id, editData);
                setIsEditingContact(false);
            };

            return (
                <div style={{ animation: 'fadeUp 0.4s ease both', display: 'flex', flexDirection: 'column', gap: 20 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <button onClick={onBack} style={{ background: 'none', border: 'none', display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', color: 'var(--gold)' }}>
                            <Icon name="chevronLeft" size={18} color="var(--gold)" />
                            <span style={{ fontWeight: 600, fontSize: 14 }}>Back</span>
                        </button>
                        <div style={{ display: 'flex', gap: 10 }}>
                            <button className="btn-action"><Icon name="plus" size={14} color="var(--gold)" /></button>
                            <button className="btn-action" style={{ background: 'var(--gold)', color: 'var(--bg)' }}>Actions</button>
                        </div>
                    </div>

                    <div style={{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 12, padding: 20 }}>
                        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
                            <div style={{ width: 44, height: 44, borderRadius: 8, background: 'var(--navy)', border: '1px solid var(--navyLight)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, fontWeight: 700, color: 'var(--gold)' }}>{project.name[0]}</div>
                            <div style={{ flex: 1 }}>
                                <h1 style={{ fontSize: 18, fontWeight: 700, color: 'var(--white)', margin: 0 }}>{project.name}</h1>
                                <span style={{ fontSize: 9, fontWeight: 800, color: 'var(--gold)', textTransform: 'uppercase' }}>{currentStage}</span>
                            </div>
                            <p style={{ fontSize: 16, fontWeight: 700, color: 'var(--goldLight)' }}>{project.value}</p>
                        </div>
                    </div>

                    <div style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: 16 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                            <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--gold)', textTransform: 'uppercase' }}>Contact Details</p>
                            {!isEditingContact ? (
                                <button onClick={() => setIsEditingContact(true)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                                    <Icon name="edit" size={14} color="var(--gold)" />
                                </button>
                            ) : (
                                <div style={{ display: 'flex', gap: 8 }}>
                                    <button onClick={handleSaveContact} style={{ background: 'var(--gold)', color: 'var(--bg)', border: 'none', borderRadius: 4, padding: '4px 8px', fontSize: 10, fontWeight: 700 }}>Save</button>
                                    <button onClick={() => setIsEditingContact(false)} style={{ background: 'none', border: '1px solid var(--border)', color: 'var(--muted)', borderRadius: 4, padding: '4px 8px', fontSize: 10, fontWeight: 700 }}>Cancel</button>
                                </div>
                            )}
                        </div>
                        
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            <div>
                                <label style={{ fontSize: 9, color: 'var(--dimText)', display: 'block' }}>Name</label>
                                {isEditingContact ? (
                                    <input className="fm-input" value={editData.client} onChange={e => setEditData({...editData, client: e.target.value})} />
                                ) : (
                                    <p style={{ fontSize: 14, color: 'var(--white)', fontWeight: 600 }}>{project.client}</p>
                                )}
                            </div>
                            <div style={{ display: 'flex', gap: 24 }}>
                                <div style={{ flex: 1 }}>
                                    <label style={{ fontSize: 9, color: 'var(--dimText)', display: 'block' }}>Phone</label>
                                    {isEditingContact ? (
                                        <input className="fm-input" value={editData.phone} onChange={e => setEditData({...editData, phone: e.target.value})} />
                                    ) : (
                                        <p style={{ fontSize: 13, color: 'var(--white)', fontWeight: 600 }}>{project.phone || "(555) 123-4567"}</p>
                                    )}
                                </div>
                                <div style={{ flex: 1 }}>
                                    <label style={{ fontSize: 9, color: 'var(--dimText)', display: 'block' }}>Email</label>
                                    {isEditingContact ? (
                                        <input className="fm-input" value={editData.email} onChange={e => setEditData({...editData, email: e.target.value})} />
                                    ) : (
                                        <p style={{ fontSize: 13, color: 'var(--white)', fontWeight: 600 }}>{project.email || "client@mail.com"}</p>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: 16 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                            <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--gold)', textTransform: 'uppercase' }}>Job Notes</p>
                            <button onClick={() => setIsAddingNote(!isAddingNote)} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
                                <Icon name="plus" size={16} color="var(--gold)" />
                            </button>
                        </div>
                        {isAddingNote && (
                            <div style={{ animation: 'fadeUp 0.3s ease both' }}>
                                <textarea placeholder="Write a note..." rows="3" value={newNoteContent} onChange={(e) => setNewNoteContent(e.target.value)} />
                                <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
                                    <button onClick={handleSaveNote} style={{ background: 'var(--gold)', border: 'none', color: 'var(--bg)', padding: '6px 12px', borderRadius: 4, fontSize: 11, fontWeight: 700, cursor: 'pointer' }}>Save Note</button>
                                    <button onClick={() => setIsAddingNote(false)} style={{ background: 'none', border: `1px solid var(--border)`, color: 'var(--muted)', padding: '6px 12px', borderRadius: 4, fontSize: 11, fontWeight: 700, cursor: 'pointer' }}>Cancel</button>
                                </div>
                            </div>
                        )}
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                            {project.notes && project.notes.length > 0 ? project.notes.map((note, idx) => (
                                <div key={idx} style={{ padding: 12, background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 8 }}>
                                    <p style={{ fontSize: 13, color: 'var(--white)', lineHeight: 1.4 }}>{note.text}</p>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8 }}>
                                        <Icon name="clock" size={10} color="var(--muted)" />
                                        <span style={{ fontSize: 10, color: 'var(--muted)' }}>{note.timestamp}</span>
                                    </div>
                                </div>
                            )) : <p style={{ fontSize: 12, color: 'var(--dimText)', textAlign: 'center', padding: '10px 0' }}>No notes yet.</p>}
                        </div>
                    </div>

                    <div style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: 16 }}>
                        <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--gold)', textTransform: 'uppercase', marginBottom: 12 }}>Financials</p>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, color: 'var(--muted)' }}>Estimate Total</span>
                                <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--white)' }}>{project.value}</span>
                            </div>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, color: 'var(--muted)' }}>Payments Made</span>
                                <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--goldLight)' }}>$0.00</span>
                            </div>
                            <div style={{ height: 1, background: 'var(--border)' }}></div>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 12, fontWeight: 700, color: 'var(--white)' }}>Balance Due</span>
                                <span style={{ fontSize: 14, fontWeight: 700, color: 'var(--white)' }}>{project.value}</span>
                            </div>
                        </div>
                    </div>

                    <div style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, overflow: 'hidden' }}>
                        <div style={{ height: 120, background: 'var(--navyMid)', display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column', gap: 4 }}>
                            <Icon name="map" size={24} color="var(--gold)" />
                            <span style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 700 }}>Map Location</span>
                        </div>
                        <div style={{ padding: 12 }}>
                            <p style={{ fontSize: 12, fontWeight: 600, color: 'var(--white)' }}>{project.addr}</p>
                            <p style={{ fontSize: 11, color: 'var(--muted)' }}>Duluth, GA 30096</p>
                        </div>
                    </div>
                </div>
            );
        }

        const FieldMindIntel = ({ projects }) => {
            const intelCards = [
                { id: 1, type: "Permit Alert", message: "Peachtree St permit expires in 72h.", action: "Renew Permit", actionColor: "var(--gold)", actionBg: "transparent", actionBorder: "1px solid var(--gold)60", icon: "calendar" },
                { id: 2, type: "Weather Risk", message: "Rain forecasted for Duluth today.", action: "View Weather", actionColor: "var(--white)", actionBg: "var(--navyLight)", actionBorder: "1px solid var(--navyLight)", icon: "cloud" }
            ];

            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                    {intelCards.map(card => (
                        <div key={card.id} style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: 16, display: 'flex', flexDirection: 'column', gap: 12, animation: 'fadeUp 0.4s ease both' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                                <Icon name={card.icon} size={20} color="var(--gold)" />
                                <p style={{ fontSize: 13, fontWeight: 600, color: 'var(--white)', margin: 0 }}>{card.type}</p>
                            </div>
                            <p style={{ fontSize: 12, color: 'var(--muted)', margin: 0, lineHeight: 1.5 }}>{card.message}</p>
                            <button className="btn-action" style={{ background: card.actionBg, border: card.actionBorder, color: card.actionColor, alignSelf: 'flex-start' }}>{card.action}</button>
                        </div>
                    ))}
                </div>
            );
        };

        function More() {
            const items = [{ label: "Company Settings", icon: "settings" }, { label: "Sub-Contractor Network", icon: "network" }, { label: "Change Order Vault", icon: "file" }, { label: "Financials & Draw Requests", icon: "dollar" }, { label: "Sign Out", icon: "logout", danger: true }];
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                    <div style={{ background: `linear-gradient(145deg, var(--navy), #0A1828)`, border: '1px solid var(--navyLight)', borderRadius: 16, padding: "20px", display: "flex", alignItems: "center", gap: 14, marginBottom: 12 }}>
                        <div style={{ width: 52, height: 52, borderRadius: 12, background: `linear-gradient(135deg, var(--goldDim), var(--gold))`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20, fontWeight: 700, color: 'var(--bg)' }}>J</div>
                        <div>
                            <p style={{ fontSize: 16, fontWeight: 600, color: 'var(--white)', margin: 0 }}>Justin Castro</p>
                            <p style={{ fontSize: 11, color: 'var(--goldDim)', margin: "3px 0 0", fontWeight: 700, textTransform: "uppercase" }}>Founder · FieldMind</p>
                        </div>
                    </div>
                    {items.map((item, i) => (
                        <div key={i} style={{ background: 'var(--elevated)', border: `1px solid ${item.danger ? "#3D1515" : 'var(--border)'}`, borderRadius: 12, padding: "16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                <Icon name={item.icon} size={16} color={item.danger ? "#6B2020" : 'var(--muted)'} />
                                <span style={{ fontSize: 14, fontWeight: 500, color: item.danger ? "#6B2020" : 'var(--white)' }}>{item.label}</span>
                            </div>
                            {!item.danger && <Icon name="chevron" size={14} color='var(--dimText)' />}
                        </div>
                    ))}
                </div>
            );
        }

        const TABS = [{ id: "dashboard", label: "Overview", icon: "grid" }, { id: "jobs", label: "Jobs", icon: "briefcase" }, { id: "ai", label: "Intel", icon: "sparkles" }, { id: "more", label: "More", icon: "menu" }];

        function FieldMind() {
            const [view, setView] = useState("dashboard");
            const [selectedProjectId, setSelectedProjectId] = useState(null);
            const [splash, setSplash] = useState(true);
            
            // INITIAL STATE WITH YOUR DATA
            const [projects, setProjects] = useState([
                { id: 1, name: "Luxury Kitchen Remodel", client: "Justin Samuel Castro", phone: "(555) 123-4567", email: "justin@fieldmind.ai", addr: "452 Highview Dr", value: "$45,000", status: "wip", notes: [{ text: "Framing inspection passed.", timestamp: "Apr 28, 10:45 AM" }] },
                { id: 2, name: "Deck Expansion", client: "Sarah Miller", addr: "102 Whispering Pines", value: "$12,500", status: "new_lead", notes: [] },
                { id: 3, name: "Foundation Inspection", client: "Robert Fox", addr: "Peachtree St", value: "$4,200", status: "paid_closed", notes: [] },
                { id: 4, name: "Basement Renovation", client: "Wade Warren", addr: "88 Oak Ave", value: "$28,000", status: "est_needed", notes: [] },
                { id: 5, name: "Master Suite Addition", client: "Jane Cooper", addr: "123 Maple St", value: "$62,000", status: "est_delivered", notes: [] },
            ]);

            useEffect(() => { 
                setTimeout(() => setSplash(false), 2000); 
                fetchLiveJobs();
            }, []);

            async function fetchLiveJobs() {
                const { data, error } = await supabase.from('projects').select('*');
                // ONLY UPDATE IF DATA ACTUALLY EXISTS IN SUPABASE
                if (!error && data && data.length > 0) {
                    setProjects(data);
                }
            }

            const openProject = (p) => { setSelectedProjectId(p.id); setView("jobDetail"); };
            const handleAddNote = (jobId, text) => {
                const now = new Date();
                const timestamp = now.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
                setProjects(prev => prev.map(p => p.id === jobId ? { ...p, notes: [{ text, timestamp }, ...p.notes] } : p));
            };
            const handleUpdateContact = async (jobId, data) => {
                const { error } = await supabase.from('projects').update(data).eq('id', jobId);
                if (!error) setProjects(prev => prev.map(p => p.id === jobId ? { ...p, ...data } : p));
            };

            const selectedProject = projects.find(p => p.id === selectedProjectId);
            const pages = {
                dashboard: <Dashboard setView={setView} projects={projects} />,
                jobs: <JobsBoard projects={projects} setProjects={setProjects} onSelectProject={openProject} />,
                jobDetail: selectedProject ? <JobDetail project={selectedProject} onBack={() => setView("jobs")} onAddNote={handleAddNote} onUpdateContact={handleUpdateContact} /> : null,
                ai: <FieldMindIntel projects={projects} />,
                more: <More />,
            };

            return (
                <div style={{ minHeight: "100vh", position: 'relative' }}>
                    {splash && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 999, background: 'var(--bg)', display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", animation: "splashFade 2s ease forwards" }}>
                            <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>FieldMind</h1>
                            <p style={{ fontSize: 10, color: 'var(--goldDim)', letterSpacing: "0.3em", textTransform: "uppercase", marginTop: 12 }}>General Operations Intelligence</p>
                        </div>
                    )}
                    <header style={{ position: "sticky", top: 0, padding: "18px 20px", background: `rgba(8, 12, 16, 0.8)`, backdropFilter: "blur(12px)", borderBottom: '1px solid var(--border)', display: "flex", justifyContent: "space-between", zIndex: 100 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: 'var(--gold)', textTransform: "uppercase" }}>{view === 'jobDetail' ? 'Job Detail' : view}</span>
                        <Icon name="bell" size={18} color='var(--dimText)' />
                    </header>
                    <main style={{ padding: "24px 20px", paddingBottom: "120px" }}>{pages[view]}</main>
                    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 10px 30px", background: `rgba(15, 20, 25, 0.95)`, backdropFilter: "blur(20px)", borderTop: '1px solid var(--border)', display: "flex", justifyContent: "space-around", zIndex: 100 }}>
                        {TABS.map(tab => (
                            <button key={tab.id} onClick={() => {setView(tab.id); setSelectedProjectId(null);}} style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, cursor: "pointer" }}>
                                <div style={{ padding: "6px 12px", borderRadius: 8, background: (view === tab.id || (view === 'jobDetail' && tab.id === 'jobs')) ? 'var(--navy)' : "transparent", border: `1px solid ${(view === tab.id || (view === 'jobDetail' && tab.id === 'jobs')) ? 'var(--navyLight)' : "transparent"}` }}>
                                    <Icon name={tab.icon} size={18} color={(view === tab.id || (view === 'jobDetail' && tab.id === 'jobs')) ? 'var(--goldLight)' : 'var(--dimText)'} />
                                </div>
                                <span style={{ fontSize: 9, fontWeight: 700, color: (view === tab.id || (view === 'jobDetail' && tab.id === 'jobs')) ? 'var(--gold)' : 'var(--dimText)', textTransform: "uppercase" }}>{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FieldMind />);
    </script>
</body>
</html>
