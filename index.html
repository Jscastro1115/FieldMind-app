<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldMind | Operations Intelligence</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #080C10; --surface: #0F1419; --elevated: #151C24;
            --border: #1E2A35; --borderGold: #B8965A44;
            --gold: #C9A84C; --goldLight: #E2C97E; --goldDim: #7A5C2A;
            --navy: #0D2340; --navyMid: #0F2D52; --navyLight: #1A4068;
            --white: #F5F0E8; --muted: #6B7D8E; --dimText: #3D4F5E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        
        .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; }
        .kanban-col { min-width: 280px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); height: calc(100dvh - 220px); display: flex; flex-direction: column; }
        .job-card { background: var(--elevated); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: transform 0.1s; }
        .job-card:active { transform: scale(0.98); }
        
        .btn-action { background: var(--elevated); border: 1px solid var(--border); color: var(--white); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
        .status-tag { font-size: 9, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- CONFIGURATION ---
        // On GitHub, replace these strings with your actual Supabase credentials
        const SUPABASE_URL = 'https://okugnkdpszqjawmvpgim.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XUdb6q6-o8ntq49ihmkOEw_GFfffsWR';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const COLUMNS = [
            { id: "new_lead", label: "New Lead" },
            { id: "est_needed", label: "Estimate Needed" },
            { id: "wip", label: "Work in Progress" },
            { id: "paid_closed", label: "Paid & Closed" }
        ];

        // --- UI COMPONENTS ---
        const Icon = ({ name, color = 'var(--muted)' }) => {
            const p = { stroke: color, strokeWidth: 1.5, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" };
            const paths = {
                grid: <><rect x="3" y="3" width="7" height="7" rx="1" {...p}/><rect x="14" y="3" width="7" height="7" rx="1" {...p}/></>,
                briefcase: <rect x="2" y="7" width="20" height="14" rx="2" {...p}/>,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" {...p}/>
            };
            return <svg viewBox="0 0 24 24" style={{width: 20, height: 20}}>{paths[name]}</svg>;
        };

        function FieldMind() {
            const [view, setView] = useState("jobs");
            const [projects, setProjects] = useState([]);
            const [connStatus, setConnStatus] = useState("Connecting...");

            useEffect(() => {
                async function syncData() {
                    try {
                        const { data, error } = await supabase.from('projects').select('*');
                        if (error) throw error;
                        setProjects(data || []);
                        setConnStatus(data?.length > 0 ? "Live Sync Active" : "Empty Table");
                    } catch (e) {
                        setConnStatus("Connection Error: Check RLS");
                        console.error(e);
                    }
                }
                syncData();
            }, []);

            return (
                <div style={{ minHeight: "100vh" }}>
                    <header style={{ padding: "20px", borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                        <span style={{ fontSize: 12, fontWeight: 800, color: 'var(--gold)', letterSpacing: '0.1em' }}>FIELDMIND</span>
                        <span style={{ fontSize: 9, color: 'var(--dimText)', fontWeight: 600 }}>{connStatus.toUpperCase()}</span>
                    </header>

                    <main className="kanban-board" style={{ padding: "20px" }}>
                        {COLUMNS.map(col => (
                            <div key={col.id} className="kanban-col">
                                <div style={{ padding: "16px", borderBottom: '1px solid var(--border)', fontSize: 10, fontWeight: 800, color: 'var(--muted)' }}>
                                    {col.label.toUpperCase()}
                                </div>
                                <div style={{ padding: "12px", overflowY: "auto" }}>
                                    {projects.filter(p => p.status === col.id).map(p => (
                                        <div key={p.id} className="job-card" style={{ marginBottom: 12 }}>
                                            <p style={{ fontSize: 14, fontWeight: 600, color: 'var(--white)' }}>{p.name}</p>
                                            <p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>{p.addr}</p>
                                            <div style={{ marginTop: 12, fontSize: 10, color: 'var(--goldLight)', fontWeight: 700 }}>{p.value}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>

                    <nav style={{ position: "fixed", bottom: 0, width: "100%", padding: "15px 0 30px", background: "var(--surface)", borderTop: "1px solid var(--border)", display: "flex", justifyContent: "space-around" }}>
                        <Icon name="grid" color={view === 'dashboard' ? 'var(--gold)' : 'var(--muted)'} />
                        <Icon name="briefcase" color={view === 'jobs' ? 'var(--gold)' : 'var(--muted)'} />
                        <Icon name="bell" />
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FieldMind />);
    </script>
</body>
</html>
