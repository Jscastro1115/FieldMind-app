<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldMind | Operations</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080C10; --surface: #0F1419; --elevated: #151C24; --border: #1E2A35;
            --borderGold: #B8965A44; --gold: #C9A84C; --goldLight: #E2C97E;
            --goldDim: #7A5C2A; --navy: #0D2340; --navyMid: #0F2D52;
            --navyLight: #1A4068; --white: #F5F0E8; --muted: #6B7D8E; --dimText: #3D4F5E;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes splashFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 20px; -webkit-overflow-scrolling: touch; }
        .kanban-col { min-width: 280px; background: var(--surface); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; height: calc(100dvh - 220px); }
        .job-card { background: var(--elevated); border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; margin-bottom: 10px; }
        .btn-action { background: var(--elevated); border: 1px solid var(--border); color: var(--white); padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://okugnkdpszqjawmvpgim.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XUdb6q6-o8ntq49ihmkOEw_GFfffsWR';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 20, color = 'var(--muted)' }) => {
            const p = { stroke: color, strokeWidth: 1.5, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" };
            const paths = {
                grid: <><rect x="3" y="3" width="7" height="7" rx="1" {...p}/><rect x="14" y="3" width="7" height="7" rx="1" {...p}/><rect x="3" y="14" width="7" height="7" rx="1" {...p}/><rect x="14" y="14" width="7" height="7" rx="1" {...p}/></>,
                briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" {...p}/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" {...p}/></>,
                sparkles: <path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z" {...p}/>,
                bell: <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" {...p}/>,
                chevron: <polyline points="9 18 15 12 9 6" {...p}/>,
                calendar: <><rect x="3" y="4" width="18" height="18" rx="2" {...p}/><line x1="3" y1="10" x2="21" y2="10" {...p}/></>,
                cloud: <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" {...p}/>,
                menu: <><line x1="3" y1="6" x2="21" y2="6" {...p}/><line x1="3" y1="12" x2="21" y2="12" {...p}/><line x1="3" y1="18" x2="21" y2="18" {...p}/></>
            };
            return <svg style={{width: size, height: size}} viewBox="0 0 24 24">{paths[name]}</svg>;
        };

        const COLUMNS = [
            { id: "new_lead", label: "New Lead" },
            { id: "wip", label: "Work in Progress" },
            { id: "paid_closed", label: "Paid & Closed" }
        ];

        function FieldMind() {
            const [view, setView] = useState("dashboard");
            const [projects, setProjects] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [loading, setLoading] = useState(true);
            const [splash, setSplash] = useState(true);

            useEffect(() => {
                setTimeout(() => setSplash(false), 2000);
                fetchJobs();
            }, []);

            async function fetchJobs() {
                const { data, error } = await supabase.from('projects').select('*');
                if (!error) setProjects(data || []);
                setLoading(false);
            }

            if (splash) return (
                <div style={{ position: "fixed", inset: 0, background: 'var(--bg)', display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", zIndex: 999 }}>
                    <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>FieldMind</h1>
                    <p style={{ fontSize: 10, color: 'var(--goldDim)', letterSpacing: "0.3em", textTransform: "uppercase", marginTop: 12 }}>General Operations Intelligence</p>
                </div>
            );

            const totalValue = projects.reduce((sum, p) => sum + (parseFloat(String(p.value).replace(/[^0-9.]/g, '')) || 0), 0);

            return (
                <div style={{ minHeight: "100vh" }}>
                    <header style={{ position: "sticky", top: 0, padding: "18px 20px", background: `rgba(8, 12, 16, 0.8)`, backdropFilter: "blur(12px)", borderBottom: '1px solid var(--border)', display: "flex", justifyContent: "space-between", zIndex: 100 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }}>{view}</span>
                        <Icon name="bell" size={18} />
                    </header>

                    <main style={{ padding: "24px 20px", paddingBottom: "120px" }}>
                        {view === "dashboard" && (
                            <div style={{ display: 'flex', flexDirection: 'column', gap: 28, animation: 'fadeUp 0.4s ease' }}>
                                <div style={{ background: 'linear-gradient(145deg, #0A1828, var(--navy))', borderRadius: 16, padding: 28, border: '1px solid var(--navyLight)' }}>
                                    <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--goldDim)', textTransform: "uppercase" }}>Projected Gross Volume</p>
                                    <h2 style={{ fontSize: 36, fontWeight: 700, color: 'var(--goldLight)', marginTop: 8 }}>${totalValue.toLocaleString()}</h2>
                                </div>
                                <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
                                    <div onClick={() => setView("jobs")} style={{ background: 'var(--elevated)', padding: 16, borderRadius: 12, border: '1px solid var(--border)', cursor: 'pointer' }}>
                                        <p style={{ fontSize: 10, color: 'var(--dimText)', fontWeight: 700 }}>ACTIVE JOBS</p>
                                        <p style={{ fontSize: 24, fontWeight: 700, marginTop: 4 }}>{projects.length}</p>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === "jobs" && (
                            <div className="kanban-board">
                                {COLUMNS.map(col => (
                                    <div key={col.id} className="kanban-col">
                                        <div style={{ padding: 16, borderBottom: '1px solid var(--border)' }}>
                                            <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }}>{col.label}</span>
                                        </div>
                                        <div style={{ padding: 12, overflowY: 'auto' }}>
                                            {projects.filter(p => p.status === col.id).map(p => (
                                                <div key={p.id} className="job-card" onClick={() => { setSelectedJob(p); setView("jobDetail"); }}>
                                                    <p style={{ fontSize: 14, fontWeight: 600 }}>{p.name}</p>
                                                    <p style={{ fontSize: 11, color: 'var(--muted)', marginTop: 4 }}>{p.addr || p.client}</p>
                                                    <p style={{ fontSize: 12, color: 'var(--goldLight)', marginTop: 8, fontWeight: 700 }}>${Number(p.value).toLocaleString()}</p>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {view === "jobDetail" && selectedJob && (
                            <div style={{ animation: 'fadeUp 0.4s ease' }}>
                                <button onClick={() => setView("jobs")} style={{ background: 'none', border: 'none', color: 'var(--gold)', fontWeight: 700, marginBottom: 20 }}>← BACK TO BOARD</button>
                                <div style={{ background: 'var(--surface)', padding: 24, borderRadius: 16, border: '1px solid var(--border)' }}>
                                    <h2 style={{ fontSize: 22, fontWeight: 700 }}>{selectedJob.name}</h2>
                                    <p style={{ color: 'var(--gold)', fontSize: 12, fontWeight: 700, marginTop: 4 }}>{selectedJob.status.toUpperCase()}</p>
                                    <hr style={{ margin: '20px 0', border: 'none', borderTop: '1px solid var(--border)' }} />
                                    <p style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700 }}>CLIENT</p>
                                    <p style={{ fontSize: 16, marginBottom: 16 }}>{selectedJob.client}</p>
                                    <p style={{ fontSize: 10, color: 'var(--muted)', fontWeight: 700 }}>CONTRACT VALUE</p>
                                    <p style={{ fontSize: 20, fontWeight: 700, color: 'var(--goldLight)' }}>${Number(selectedJob.value).toLocaleString()}</p>
                                </div>
                            </div>
                        )}

                        {view === "ai" && (
                             <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                                <div style={{ background: 'var(--elevated)', padding: 20, borderRadius: 12, border: '1px solid var(--borderGold)' }}>
                                    <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 10 }}>
                                        <Icon name="calendar" color="var(--gold)" />
                                        <p style={{ fontWeight: 700, fontSize: 14 }}>Permit Alert</p>
                                    </div>
                                    <p style={{ fontSize: 13, color: 'var(--muted)' }}>Peachtree St structural permits expire in 72 hours. Shall I initiate renewal?</p>
                                </div>
                             </div>
                        )}
                    </main>

                    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 10px 30px", background: `rgba(15, 20, 25, 0.95)`, backdropFilter: "blur(20px)", borderTop: '1px solid var(--border)', display: "flex", justifyContent: "space-around" }}>
                        <button onClick={() => setView("dashboard")} style={{ background: 'none', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                            <Icon name="grid" color={view === 'dashboard' ? 'var(--gold)' : 'var(--dimText)'} />
                            <span style={{ fontSize: 9, fontWeight: 700, color: view === 'dashboard' ? 'var(--gold)' : 'var(--dimText)' }}>HQ</span>
                        </button>
                        <button onClick={() => setView("jobs")} style={{ background: 'none', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                            <Icon name="briefcase" color={(view === 'jobs' || view === 'jobDetail') ? 'var(--gold)' : 'var(--dimText)'} />
                            <span style={{ fontSize: 9, fontWeight: 700, color: (view === 'jobs' || view === 'jobDetail') ? 'var(--gold)' : 'var(--dimText)' }}>JOBS</span>
                        </button>
                        <button onClick={() => setView("ai")} style={{ background: 'none', border: 'none', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
                            <Icon name="sparkles" color={view === 'ai' ? 'var(--gold)' : 'var(--dimText)'} />
                            <span style={{ fontSize: 9, fontWeight: 700, color: view === 'ai' ? 'var(--gold)' : 'var(--dimText)' }}>INTEL</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FieldMind />);
    </script>
</body>
</html>
