<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldMind | Operations</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080C10;
            --surface: #0F1419;
            --elevated: #151C24;
            --border: #1E2A35;
            --borderGold: #B8965A44;
            --gold: #C9A84C;
            --goldLight: #E2C97E;
            --goldDim: #7A5C2A;
            --navy: #0D2340;
            --navyMid: #0F2D52;
            --navyLight: #1A4068;
            --white: #F5F0E8;
            --muted: #6B7D8E;
            --dimText: #3D4F5E;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        body { 
            background: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow-x: hidden; 
        }
        ::-webkit-scrollbar { display: none; }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes splashFade { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; pointer-events: none; } }
        
        .kanban-board {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .kanban-col {
            min-width: 280px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex; flex-direction: column;
            height: calc(100dvh - 220px);
        }
        .job-card { cursor: pointer; transition: opacity 0.2s; }
        .job-card:active { opacity: 0.7; }

        .btn-action {
            background: var(--elevated);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; gap: 8px;
        }
        
        textarea, .fm-input {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--white);
            border-radius: 8px;
            padding: 10px;
            font-family: inherit;
            font-size: 13px;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Configuration
        const SUPABASE_URL = 'https://okugnkdpszqjawmvpgim.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_XUdb6q6-o8ntq49ihmkOEw_GFfffsWR';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Icon = ({ name, size = 20, color = 'var(--muted)', strokeWidth = 1.5 }) => {
            const s = { width: size, height: size, flexShrink: 0 };
            const p = { stroke: color, strokeWidth, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" };
            const paths = {
                grid: <><rect x="3" y="3" width="7" height="7" rx="1" {...p}/><rect x="14" y="3" width="7" height="7" rx="1" {...p}/><rect x="3" y="14" width="7" height="7" rx="1" {...p}/><rect x="14" y="14" width="7" height="7" rx="1" {...p}/></>,
                briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" {...p}/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" {...p}/></>,
                sparkles: <><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z" {...p}/><path d="M19 3l.75 2.25L22 6l-2.25.75L19 9l-.75-2.25L16 6l2.25-.75z" {...p}/></>,
                menu: <><line x1="3" y1="6" x2="21" y2="6" {...p}/><line x1="3" y1="12" x2="21" y2="12" {...p}/><line x1="3" y1="18" x2="21" y2="18" {...p}/></>,
                bell: <><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" {...p}/><path d="M13.73 21a2 2 0 0 1-3.46 0" {...p}/></>,
                chevron: <><polyline points="9 18 15 12 9 6" {...p}/></>,
                chevronLeft: <><polyline points="15 18 9 12 15 6" {...p}/></>,
                plus: <><line x1="12" y1="5" x2="12" y2="19" {...p}/><line x1="5" y1="12" x2="19" y2="12" {...p}/></>,
            };
            return <svg viewBox="0 0 24 24" style={s}>{paths[name] || null}</svg>;
        };

        const COLUMNS = [
            { id: "new_lead", label: "New Lead" },
            { id: "est_needed", label: "Estimate Needed" },
            { id: "est_delivered", label: "Estimate Delivered" },
            { id: "needs_scheduling", label: "Needs Scheduling" },
            { id: "wip", label: "Work in Progress" },
            { id: "invoice_sent", label: "Final Invoice Sent" },
            { id: "paid_closed", label: "Paid & Closed" },
            { id: "lost_lead", label: "Lost Lead" }
        ];

        function Dashboard({ setView, projects }) {
            const activeCount = projects.filter(p => ["wip", "needs_scheduling"].includes(p.status)).length;
            return (
                <div style={{ display: "flex", flexDirection: "column", gap: 28 }}>
                    <div style={{ background: `linear-gradient(145deg, #0A1828 0%, var(--navy) 60%, #0A2240 100%)`, borderRadius: 16, padding: "28px 24px", border: '1px solid var(--navyLight)' }}>
                        <p style={{ fontSize: 10, fontWeight: 700, color: 'var(--goldDim)', textTransform: "uppercase" }}>Projected Gross Volume</p>
                        <h2 style={{ fontSize: 36, fontWeight: 700, color: 'var(--goldLight)', margin: "8px 0 0" }}>$184,200</h2>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div onClick={() => setView("jobs")} style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: "16px", cursor: "pointer" }}>
                            <p style={{ fontSize: 10, color: 'var(--dimText)', textTransform: "uppercase", fontWeight: 700 }}>Active Jobs</p>
                            <p style={{ fontSize: 24, fontWeight: 700, color: 'var(--white)' }}>{activeCount}</p>
                            <p style={{ fontSize: 10, color: 'var(--gold)', margin: "4px 0 0", fontWeight: 600 }}>Tap to view board</p>
                        </div>
                    </div>
                </div>
            );
        }

        function JobsBoard({ projects, onSelectProject }) {
            return (
                <div className="kanban-board">
                    {COLUMNS.map(col => (
                        <div key={col.id} className="kanban-col">
                            <div style={{ padding: "16px", borderBottom: '1px solid var(--border)' }}>
                                <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }}>{col.label}</span>
                            </div>
                            <div style={{ flex: 1, padding: "12px", display: "flex", flexDirection: "column", gap: 12, overflowY: "auto" }}>
                                {projects.filter(p => p.status === col.id).map(p => (
                                    <div key={p.id} onClick={() => onSelectProject(p)} className="job-card" style={{ background: 'var(--elevated)', border: '1px solid var(--border)', borderRadius: 12, padding: "14px" }}>
                                        <p style={{ fontSize: 14, fontWeight: 600, color: 'var(--white)' }}>{p.name}</p>
                                        <p style={{ fontSize: 11, color: 'var(--muted)', margin: "4px 0 8px" }}>{p.addr}</p>
                                        <div style={{ display: "flex", justifyContent: "space-between" }}>
                                            <span style={{ fontSize: 10, fontWeight: 700, color: 'var(--goldLight)', background: 'var(--navy)', padding: "2px 8px", borderRadius: 4 }}>{p.value}</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            );
        }

        function FieldMind() {
            const [view, setView] = useState("dashboard");
            const [projects, setProjects] = useState([]);
            const [loading, setLoading] = useState(true);
            const [splash, setSplash] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const { data, error: sbError } = await supabase.from('projects').select('*');
                        if (sbError) throw sbError;
                        setProjects(data || []);
                    } catch (e) {
                        setError(e.message);
                    } finally {
                        setLoading(false);
                        setTimeout(() => setSplash(false), 1000);
                    }
                };
                loadData();
            }, []);

            const pages = {
                dashboard: <Dashboard setView={setView} projects={projects} />,
                jobs: <JobsBoard projects={projects} onSelectProject={() => {}} />,
                ai: <div style={{ color: 'var(--muted)', textAlign: 'center' }}>Intel Feed Active</div>,
                more: <div style={{ color: 'var(--muted)', textAlign: 'center' }}>Settings</div>
            };

            return (
                <div style={{ minHeight: "100vh" }}>
                    {splash && (
                        <div style={{ position: "fixed", inset: 0, zIndex: 999, background: 'var(--bg)', display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                            <h1 style={{ fontSize: 32, fontWeight: 700, letterSpacing: "0.1em" }}>FIELDMIND</h1>
                        </div>
                    )}
                    <header style={{ position: "sticky", top: 0, padding: "18px 20px", background: 'rgba(8, 12, 16, 0.8)', backdropFilter: "blur(12px)", borderBottom: '1px solid var(--border)', display: "flex", justifyContent: "space-between", zIndex: 100 }}>
                        <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--gold)', textTransform: "uppercase" }}>{view}</span>
                        <div style={{ fontSize: 9, color: error ? '#ff4d4d' : 'var(--goldDim)' }}>
                            {loading ? "SYNCING..." : (error ? "DB ERROR" : "LIVE")}
                        </div>
                    </header>
                    <main style={{ padding: "24px 20px", paddingBottom: "120px" }}>{pages[view]}</main>
                    <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, padding: "12px 10px 30px", background: 'var(--surface)', borderTop: '1px solid var(--border)', display: "flex", justifyContent: "space-around", zIndex: 100 }}>
                        {['dashboard', 'jobs', 'ai', 'more'].map(id => (
                            <button key={id} onClick={() => setView(id)} style={{ background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                                <Icon name={id === 'dashboard' ? 'grid' : id === 'jobs' ? 'briefcase' : id === 'ai' ? 'sparkles' : 'menu'} color={view === id ? 'var(--gold)' : 'var(--muted)'} />
                                <span style={{ fontSize: 9, fontWeight: 700, color: view === id ? 'var(--gold)' : 'var(--muted)', textTransform: "uppercase" }}>{id}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FieldMind />);
    </script>
</body>
</html>
